<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby | LootSphere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { stake: { bg: '#0f212e', nav: '#1a2c38', card: '#213743', cardHover: '#2f4553', green: '#00e701', blue: '#1475e1', blueHover: '#1b80f4', text: '#b1bad3', white: '#ffffff', purple: '#8b5cf6', purpleHover: '#7c3aed', red: '#ef4444' } } } } }
    </script>
    <style>
        body { -webkit-user-select: none; user-select: none; background-color: #0f212e; color: #ffffff; overflow-x: hidden; }
        img { -webkit-user-drag: none; pointer-events: none; } 
        ::-webkit-scrollbar { width: 6px; } 
        ::-webkit-scrollbar-track { background: #0f212e; } 
        ::-webkit-scrollbar-thumb { background: #213743; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen font-sans">
    
    <header class="bg-stake-nav sticky top-0 z-40 shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
            <div onclick="window.location.href='index.html'" class="text-2xl font-black text-white tracking-tighter cursor-pointer flex items-center gap-2">
                <svg class="w-6 h-6 text-stake-blue" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg> LootSphere
            </div>
            
            <nav class="flex space-x-6 text-sm font-bold text-stake-text">
                <button onclick="window.location.href='index.html'" class="text-white hover:text-white transition">Packs</button>
                <button class="hover:text-white transition">Battles</button>
                <button class="hover:text-white transition">Draws</button>
            </nav>

            <div class="flex items-center space-x-3">
                <div class="relative">
                    <button onclick="toggleMenu('balance-menu')" id="display-balance" class="bg-stake-bg px-4 py-2 rounded-md text-stake-green font-bold text-sm shadow-inner transition-colors border border-stake-card hover:border-stake-blue">
                        $0.00
                    </button>
                    <div id="balance-menu" class="hidden absolute right-0 mt-2 w-40 bg-stake-card rounded shadow-xl border border-stake-nav z-50 p-1">
                        <button onclick="handleBanking('deposit')" class="block w-full text-left px-4 py-2 hover:bg-stake-bg text-sm font-bold rounded">Deposit</button>
                        <button onclick="handleBanking('withdraw')" class="block w-full text-left px-4 py-2 hover:bg-stake-bg text-sm font-bold rounded">Withdraw</button>
                    </div>
                </div>

                <button onclick="toggleInventory()" class="px-4 py-2 bg-stake-card text-stake-text text-sm font-bold rounded-md hover:bg-stake-cardHover flex items-center transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                </button>

                <div class="relative">
                    <button onclick="toggleMenu('account-menu')" class="px-4 py-2 bg-stake-blue text-white text-sm font-bold rounded-md hover:bg-stake-blueHover flex items-center transition">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
                    </button>
                    <div id="account-menu" class="hidden absolute right-0 mt-2 w-40 bg-stake-card rounded shadow-xl border border-stake-nav z-50 p-1">
                        </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto w-full">
        <div id="view-lobby" class="p-4 mt-6">
            <div class="mb-8 flex items-center gap-3">
                <div class="w-2 h-6 bg-stake-blue rounded-full"></div>
                <h1 class="text-2xl font-bold text-white">Lobby</h1>
            </div>
            
            <div id="catalog-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                </div>
        </div>
    </main>

    <div id="transactions-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[70] flex items-center justify-center p-4">
        <div class="bg-stake-nav rounded-lg w-full max-w-2xl max-h-[80vh] flex flex-col shadow-2xl border border-stake-card">
            <div class="flex justify-between items-center p-5 border-b border-stake-bg">
                <h3 class="text-xl font-bold text-white">Transaction History</h3>
                <button onclick="document.getElementById('transactions-modal').classList.add('hidden')" class="text-stake-text hover:text-white font-bold text-2xl leading-none">&times;</button>
            </div>
            <div class="p-5 overflow-y-auto flex-grow bg-stake-bg">
                <table class="w-full text-left text-sm text-stake-text">
                    <thead>
                        <tr><th class="p-2 border-b border-stake-card">Date</th><th class="p-2 border-b border-stake-card">Type</th><th class="p-2 border-b border-stake-card">Details</th><th class="p-2 border-b border-stake-card text-right">Amount</th></tr>
                    </thead>
                    <tbody id="tx-list-body" class="divide-y divide-stake-nav"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="ban-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="bg-stake-nav border border-stake-red rounded-lg w-full max-w-md p-8 text-center shadow-2xl shadow-stake-red/20">
            <div class="w-16 h-16 bg-red-900/50 text-stake-red rounded-full flex items-center justify-center mx-auto mb-4 border border-stake-red">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>
            </div>
            <h2 class="text-2xl font-black text-white mb-2">Account Banned</h2>
            <p class="text-stake-text text-sm mb-6">Your account has been suspended by an administrator. You cannot participate in games or manipulate your wallet.</p>
            <button type="button" onclick="document.getElementById('ban-modal').classList.add('hidden')" class="w-full py-3 bg-stake-card text-white font-bold rounded-md hover:bg-stake-cardHover transition border border-stake-card">Acknowledge</button>
        </div>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
        <div class="bg-stake-nav rounded-lg w-full max-w-md shadow-2xl border border-stake-card overflow-hidden">
            <div class="flex justify-between items-center p-5 border-b border-stake-bg">
                <h3 id="auth-title" class="text-xl font-bold text-white">Login</h3>
                <button type="button" onclick="closeAuthModal()" class="text-stake-text hover:text-white font-bold text-2xl leading-none">&times;</button>
            </div>
            
            <div class="flex border-b border-stake-bg">
                <button type="button" id="tab-login" onclick="switchAuthTab('login')" class="flex-1 py-3 text-sm font-bold text-white border-b-2 border-stake-blue bg-stake-card transition">Login</button>
                <button type="button" id="tab-register" onclick="switchAuthTab('register')" class="flex-1 py-3 text-sm font-bold text-stake-text border-b-2 border-transparent hover:bg-stake-bg transition">Register</button>
            </div>

            <form id="auth-form" onsubmit="handleAuth(event); return false;" class="p-6 space-y-4">
                <div id="auth-error" class="hidden p-3 bg-red-900/50 border border-red-500 text-stake-red rounded-md text-sm font-bold text-center"></div>
                
                <div id="register-fields" class="hidden space-y-4">
                    <input type="text" id="auth-username" placeholder="Username" class="w-full px-4 py-3 rounded-md bg-stake-bg border border-stake-card text-white focus:ring-2 focus:ring-stake-blue outline-none">
                </div>
                
                <input type="email" id="auth-email" placeholder="Email Address" class="w-full px-4 py-3 rounded-md bg-stake-bg border border-stake-card text-white focus:ring-2 focus:ring-stake-blue outline-none" required>
                <input type="password" id="auth-password" placeholder="Password" class="w-full px-4 py-3 rounded-md bg-stake-bg border border-stake-card text-white focus:ring-2 focus:ring-stake-blue outline-none" required>
                
                <button type="submit" id="auth-submit-btn" class="w-full py-3 mt-2 bg-stake-green text-stake-bg rounded-md font-black text-lg hover:bg-[#00c701] transition shadow-lg">
                    Login Now
                </button>
            </form>
        </div>
    </div>

    <div id="inventory-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-stake-nav rounded-lg w-full max-w-2xl max-h-[80vh] flex flex-col shadow-2xl border border-stake-card">
            <div class="flex justify-between items-center p-5 border-b border-stake-bg">
                <h3 class="text-xl font-bold text-white">Inventory</h3>
                <button type="button" onclick="toggleInventory()" class="text-stake-text hover:text-white font-bold text-2xl leading-none">&times;</button>
            </div>
            <div id="inventory-list" class="p-5 overflow-y-auto flex-grow space-y-3"></div>
            
            <div class="p-5 border-t border-stake-bg bg-stake-nav rounded-b-lg flex justify-between items-center">
                <button type="button" onclick="sellAllInventory()" class="px-6 py-2 bg-stake-green hover:bg-[#00c701] text-stake-bg rounded-md font-bold transition shadow-md">Sell All</button>
                <button type="button" onclick="toggleInventory()" class="px-6 py-2 bg-stake-card text-white hover:bg-stake-cardHover rounded-md font-bold transition">Close</button>
            </div>
        </div>
    </div>

    <script>
        let userBalance = 0; 
        let userInventory = []; 
        let globalPacksData = []; 
        let currentAuthMode = 'login';

        const defaultPacks = [
            { 
                name: "Money Crunch", price: 0.11, image: "https://images.unsplash.com/photo-1556821840-3a63f95609a7", 
                contents: [
                    { name: "Apple Gift Cards", value: 250.00, chance: 0.0010, image: "https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" },
                    { name: "PlayStation Store", value: 100.00, chance: 0.0010, image: "https://upload.wikimedia.org/wikipedia/commons/0/00/PlayStation_logo.svg" },
                    { name: "Voucher", value: 0.01, chance: 68.9980, image: "https://cdn-icons-png.flaticon.com/512/2611/2611158.png" }
                ]
            }
        ];

        window.onload = function() { 
            checkAuth(); 
            loadLobbyPacks(); 
        };

        // --- AUTH & USER DATA SYSTEM ---
        function checkAuth() {
            let activeUser = JSON.parse(localStorage.getItem('lootSphereActiveUser'));
            const accountMenu = document.getElementById('account-menu');
            
            if(activeUser) {
                // Keep data perfectly in sync with the global database
                const users = JSON.parse(localStorage.getItem('lootSphereUsers')) || [];
                const latestUser = users.find(u => u.email === activeUser.email);
                
                if (latestUser) {
                    activeUser = latestUser;
                    localStorage.setItem('lootSphereActiveUser', JSON.stringify(latestUser));
                    userBalance = latestUser.balance !== undefined ? latestUser.balance : 0;
                    userInventory = latestUser.inventory || [];
                    updateBalanceDisplay();
                }

                if(activeUser.banned) {
                    accountMenu.innerHTML = `
                        <div class="px-4 py-3 text-xs text-stake-red border-b border-stake-bg font-bold">⚠️ BANNED<br><span class="text-white text-sm mt-1 inline-block">${activeUser.username}</span></div>
                        <button onclick="logout()" class="block w-full text-left px-4 py-2 hover:bg-stake-bg text-sm font-bold text-stake-red rounded">Logout</button>
                    `;
                } else {
                    accountMenu.innerHTML = `
                        <div class="px-4 py-3 text-xs text-stake-text border-b border-stake-bg font-bold truncate">Logged in as:<br><span class="text-white text-sm mt-1 inline-block">${activeUser.username}</span></div>
                        <button onclick="openUserTransactions()" class="block w-full text-left px-4 py-2 hover:bg-stake-bg text-sm font-bold text-stake-blue rounded">Transactions</button>
                        <button onclick="logout()" class="block w-full text-left px-4 py-2 hover:bg-stake-bg text-sm font-bold text-stake-red rounded border-t border-stake-bg mt-1">Logout</button>
                    `;
                }
            } else {
                userBalance = 0; 
                userInventory = []; 
                updateBalanceDisplay();
                accountMenu.innerHTML = `
                    <button onclick="openAuthModal('login')" class="block w-full text-left px-4 py-2 hover:bg-stake-bg text-sm font-bold rounded">Login</button>
                    <button onclick="openAuthModal('register')" class="block w-full text-left px-4 py-2 hover:bg-stake-bg text-sm font-bold rounded">Sign Up</button>
                `;
            }
        }

        function logTransaction(amount, type, details) {
            let activeUser = JSON.parse(localStorage.getItem('lootSphereActiveUser'));
            if(activeUser) {
                if(!activeUser.transactions) activeUser.transactions = [];
                activeUser.transactions.push({ id: Date.now(), date: new Date().toLocaleString(), amount: amount, type: type, details: details });
                activeUser.balance = userBalance; 
                activeUser.inventory = userInventory;
                localStorage.setItem('lootSphereActiveUser', JSON.stringify(activeUser));
                
                let users = JSON.parse(localStorage.getItem('lootSphereUsers')) || [];
                let uIndex = users.findIndex(u => u.email === activeUser.email);
                if(uIndex > -1) { 
                    users[uIndex] = activeUser; 
                    localStorage.setItem('lootSphereUsers', JSON.stringify(users)); 
                }
            }
        }

        function handleBanking(action) {
            let activeUser = JSON.parse(localStorage.getItem('lootSphereActiveUser'));
            if(!activeUser) return openAuthModal('login');
            if(activeUser.banned) return document.getElementById('ban-modal').classList.remove('hidden');

            document.getElementById('balance-menu').classList.add('hidden');
            let amt = prompt(`Enter amount to ${action} ($):`);
            amt = parseFloat(amt);

            if(amt && amt > 0) {
                if(action === 'withdraw' && amt > userBalance) return alert("Insufficient funds!");
                if(action === 'deposit') { 
                    userBalance += amt; 
                    logTransaction(amt, 'deposit', 'User wallet deposit'); 
                }
                if(action === 'withdraw') { 
                    userBalance -= amt; 
                    logTransaction(-amt, 'withdraw', 'User wallet withdrawal'); 
                }
                updateBalanceDisplay(); 
                alert(`${action.charAt(0).toUpperCase() + action.slice(1)} successful!`);
            }
        }

        function openUserTransactions() {
            let activeUser = JSON.parse(localStorage.getItem('lootSphereActiveUser'));
            let tbody = document.getElementById('tx-list-body'); 
            tbody.innerHTML = '';
            
            let txs = activeUser.transactions || [];
            if(txs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center">No transactions yet.</td></tr>';
            } else {
                txs.slice().reverse().forEach(tx => {
                    let color = tx.amount >= 0 ? 'text-stake-green' : 'text-stake-red';
                    let sign = tx.amount >= 0 ? '+' : '';
                    tbody.innerHTML += `<tr><td class="p-2">${tx.date}</td><td class="p-2 capitalize">${tx.type}</td><td class="p-2">${tx.details}</td><td class="p-2 text-right font-bold ${color}">${sign}$${Math.abs(tx.amount).toFixed(2)}</td></tr>`;
                });
            }
            
            document.getElementById('account-menu').classList.add('hidden');
            document.getElementById('transactions-modal').classList.remove('hidden');
        }

        function updateBalanceDisplay() { 
            document.getElementById('display-balance').innerText = `$${userBalance.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`; 
        }
        
        function logout() { 
            localStorage.removeItem('lootSphereActiveUser'); 
            checkAuth(); 
        }

        // --- INVENTORY LOGIC ---
        function toggleInventory() {
            const activeUser = JSON.parse(localStorage.getItem('lootSphereActiveUser'));
            if(!activeUser) return openAuthModal('login');
            if(activeUser.banned) return document.getElementById('ban-modal').classList.remove('hidden');
            
            const modal = document.getElementById('inventory-modal');
            if (modal.classList.contains('hidden')) { 
                renderInventory(); 
                modal.classList.remove('hidden'); 
            } else { 
                modal.classList.add('hidden'); 
            }
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list'); 
            list.innerHTML = '';
            
            if (userInventory.length === 0) {
                list.innerHTML = `<div class="text-center text-stake-text py-10 font-bold">Your inventory is empty.</div>`;
                return;
            }
            
            const displayList = [...userInventory].reverse();
            displayList.forEach((item, index) => {
                const actualIndex = userInventory.length - 1 - index;
                list.innerHTML += `
                    <div class="flex items-center justify-between bg-stake-bg p-3 rounded-md border border-stake-card">
                        <div class="flex items-center space-x-4">
                            <div class="w-14 h-14 bg-stake-nav rounded flex items-center justify-center p-1 border border-stake-card">
                                <img src="${item.image}" class="max-h-full object-contain">
                            </div>
                            <div>
                                <h4 class="font-bold text-white text-sm">${item.name}</h4>
                                <p class="text-stake-green text-sm font-bold mt-0.5">$${parseFloat(item.value).toFixed(2)}</p>
                            </div>
                        </div>
                        <button onclick="sellFromInventory(${actualIndex})" class="px-5 py-2 bg-stake-card text-white text-sm font-bold hover:bg-stake-cardHover rounded transition">Sell</button>
                    </div>`;
            });
        }

        function sellFromInventory(index) {
            let itemVal = userInventory[index].value; 
            let itemName = userInventory[index].name; 
            userBalance += itemVal; 
            userInventory.splice(index, 1);
            updateBalanceDisplay(); 
            logTransaction(itemVal, 'sell', `Sold ${itemName} from inventory`); 
            renderInventory();
        }

        function sellAllInventory() {
            if (userInventory.length === 0) return;
            let total = 0; 
            let count = userInventory.length;
            
            userInventory.forEach(item => total += item.value);
            userBalance += total; 
            userInventory = [];
            
            updateBalanceDisplay(); 
            logTransaction(total, 'sell', `Sold all ${count} items from inventory`); 
            renderInventory();
        }

        // --- LOBBY RENDERING ---
        function loadLobbyPacks() {
            const stored = localStorage.getItem('lootSpherePacks'); 
            globalPacksData = stored ? JSON.parse(stored) : defaultPacks; 
            globalPacksData.sort((a, b) => b.price - a.price);
            
            const grid = document.getElementById('catalog-grid'); 
            grid.innerHTML = '';
            
            globalPacksData.forEach((pack, index) => {
                grid.innerHTML += `
                    <div onclick="window.location.href='pack.html?id=${index}'" class="group relative bg-stake-card rounded-md flex flex-col overflow-hidden cursor-pointer hover:-translate-y-1 hover:bg-stake-cardHover transition-all shadow-sm">
                        <div class="w-full aspect-square bg-stake-bg/50 p-2 flex items-center justify-center">
                            <img src="${pack.image}" class="max-h-full w-full object-contain group-hover:scale-105 transition-transform duration-300">
                        </div>
                        <h3 class="text-sm font-bold text-center mt-2 px-1 truncate">${pack.name}</h3>
                        <div class="w-full py-2 text-center">
                            <span class="text-stake-green font-bold text-sm">$${parseFloat(pack.price).toFixed(2)}</span>
                        </div>
                    </div>`;
            });
        }

        // --- MENUS AND OUTSIDE CLICKS ---
        function toggleMenu(id) { 
            const menus = ['balance-menu', 'account-menu']; 
            menus.forEach(menuId => { 
                const el = document.getElementById(menuId); 
                if (menuId === id) { el.classList.toggle('hidden'); } else { el.classList.add('hidden'); } 
            }); 
        }
        
        document.addEventListener('click', (e) => { 
            if (!e.target.closest('.relative') && !e.target.closest('#auth-modal') && !e.target.closest('#transactions-modal')) { 
                document.getElementById('balance-menu').classList.add('hidden'); 
                document.getElementById('account-menu').classList.add('hidden'); 
            } 
        });

        // --- AUTHENTICATION MODAL FUNCTIONS ---
        function openAuthModal(mode) { 
            document.getElementById('account-menu').classList.add('hidden'); 
            switchAuthTab(mode); 
            document.getElementById('auth-modal').classList.remove('hidden'); 
        }
        
        function closeAuthModal() { 
            document.getElementById('auth-modal').classList.add('hidden'); 
            document.getElementById('auth-error').classList.add('hidden'); 
            document.getElementById('auth-form').reset(); 
        }
        
        function switchAuthTab(mode) { 
            currentAuthMode = mode; 
            const errorBox = document.getElementById('auth-error'); 
            errorBox.classList.add('hidden'); 
            
            if(mode === 'login') { 
                document.getElementById('tab-login').className = "flex-1 py-3 text-sm font-bold text-white border-b-2 border-stake-blue bg-stake-card transition"; 
                document.getElementById('tab-register').className = "flex-1 py-3 text-sm font-bold text-stake-text border-b-2 border-transparent hover:bg-stake-bg transition"; 
                document.getElementById('register-fields').classList.add('hidden'); 
                document.getElementById('auth-username').removeAttribute('required'); 
                document.getElementById('auth-title').innerText = "Login"; 
                document.getElementById('auth-submit-btn').innerText = "Login Now"; 
            } else { 
                document.getElementById('tab-register').className = "flex-1 py-3 text-sm font-bold text-white border-b-2 border-stake-blue bg-stake-card transition"; 
                document.getElementById('tab-login').className = "flex-1 py-3 text-sm font-bold text-stake-text border-b-2 border-transparent hover:bg-stake-bg transition"; 
                document.getElementById('register-fields').classList.remove('hidden'); 
                document.getElementById('auth-username').setAttribute('required', 'true'); 
                document.getElementById('auth-title').innerText = "Create Account"; 
                document.getElementById('auth-submit-btn').innerText = "Sign Up & Play"; 
            } 
        }
        
        function handleAuth(e) { 
            e.preventDefault(); 
            const email = document.getElementById('auth-email').value.trim(); 
            const password = document.getElementById('auth-password').value.trim(); 
            const username = document.getElementById('auth-username').value.trim(); 
            const errorBox = document.getElementById('auth-error'); 
            
            let users = JSON.parse(localStorage.getItem('lootSphereUsers')) || []; 
            
            if(currentAuthMode === 'register') { 
                if(users.find(u => u.email === email)) { 
                    errorBox.innerText = "Email already exists!"; 
                    errorBox.classList.remove('hidden'); 
                    return; 
                } 
                // Default Registration Money ($1250 Promo logic applied here)
                const newUser = { username, email, password, balance: 1250.00, banned: false, inventory: [], transactions: [] }; 
                users.push(newUser); 
                localStorage.setItem('lootSphereUsers', JSON.stringify(users)); 
                localStorage.setItem('lootSphereActiveUser', JSON.stringify(newUser)); 
                closeAuthModal(); 
                checkAuth(); 
            } else { 
                const user = users.find(u => u.email === email && u.password === password); 
                if(user) { 
                    localStorage.setItem('lootSphereActiveUser', JSON.stringify(user)); 
                    closeAuthModal(); 
                    checkAuth(); 
                } else { 
                    errorBox.innerText = "Invalid email or password."; 
                    errorBox.classList.remove('hidden'); 
                } 
            } 
        }
    </script>
</body>
</html>
